        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@700&display=swap');

        :root {
            --fondo: #05160a;
            --ancho: 400px;
            --largo: 550px;
        }

        body {
            background-color: var(--fondo);
            background-image: radial-gradient(circle, #1b4332 0%, #05160a 100%);
            margin: 0; height: 100vh; display: flex;
            justify-content: center; align-items: center;
            overflow: hidden; perspective: 2000px;
        }

        .book {
            position: relative;
            width: var(--ancho); height: var(--largo);
            transform-style: preserve-3d;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        .paper {
            position: absolute; width: 100%; height: 100%;
            transform-origin: left;
            transition: transform 1.3s cubic-bezier(0.645, 0.045, 0.355, 1);
            transform-style: preserve-3d;
        }

        .paper.flipped { transform: rotateY(-180deg); }

        .front, .back {

            backface-visibility: hidden; padding: 25px;

            border-left: 5px solid #5d4037;
            border-radius: 0 15px 15px 0;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.2);
            
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; text-align: center;
            overflow: hidden;
        }

        .back { transform: rotateY(180deg); border-radius: 15px 0 0 15px; }

        /* --- CONFIGURACIÓN DE DECORACIONES --- */

            pointer-events: none;
            z-index: 2;
            opacity: 0.85;
        }
        .decor2 {

        .decor-bottom-left-4 { bottom: -10px; left: 100px; width: 300px; }
        .decor-corner { bottom: -10px; right: -10px; width: 130px; }
        .decor-side { top: 20%; left: -10px; width: 80px; }

    <script>
        const music = document.getElementById('background-music');
        let musicStarted = false;

        function startMusic() {
            if (!musicStarted) {
                music.play().then(() => { music.volume = 0.4; musicStarted = true; })
                .catch(e => console.log("Música lista"));
            }
        }

        function typeWriter(element) {
            if (!element) return;
            const text = element.getAttribute('data-text');
            element.innerHTML = "";
            let i = 0;
            const timer = setInterval(() => {
                if(i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                } else { clearInterval(timer); }
            }, 55);
        }

        let current = 1;
        const totalPapers = 8;

        function next() {
            startMusic();
            if(current <= totalPapers) {
                const paper = document.getElementById(`p${current}`);
                paper.classList.add("flipped");
                paper.style.zIndex = current;
                setTimeout(() => {
                    const nextFront = document.querySelector(`#p${current + 1} .front .letter-text`);
                    const currentBack = paper.querySelector('.back .letter-text');
                    if(nextFront) typeWriter(nextFront);
                    if(currentBack) typeWriter(currentBack);
                }, 900);
                current++;
            }
        }

        function prev() {
            if(current > 1) {
                current--;
                const paper = document.getElementById(`p${current}`);
                paper.classList.remove("flipped");
                paper.style.zIndex = totalPapers + 1 - current;
                typeWriter(paper.querySelector('.front .letter-text'));
            }
        }

        window.onload = () => typeWriter(document.querySelector('#p1 .front .letter-text'));
    </script>
